name: Loto7 Auto Update

on:
  schedule:
    # 金 05:00 JST（= 木 20:00 UTC）：購入前に他サイト予想を収集
    - cron: "0 20 * * 4"
    # 土 09:00 JST（= 土 00:00 UTC）：抽選後に結果取得＋全更新＋採点
    - cron: "0 0 * * 6"
    # 毎月1日 03:00 UTC：生存維持（60日無操作でActionsが自動停止するのを防ぐ）
    - cron: "0 3 1 * *"
  workflow_dispatch: {}   # 手動でも実行可能

permissions:
  contents: write   # keepaliveの自動コミット用

jobs:
  # 月1回の生存維持：小さなコミットを打ってリポジトリを“活動中”に保つ（Actionsの60日自動停止を回避）
  keepalive:
    if: github.event.schedule == '0 3 1 * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: keepalive commit
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last_keepalive.txt
          git config user.name "loto7-bot"
          git config user.email "loto7-bot@users.noreply.github.com"
          git add .github/last_keepalive.txt
          git commit -m "chore: keepalive $(date -u +%Y-%m-%d)" || echo "no change"
          git push || echo "push skipped"

  update:
    if: github.event.schedule != '0 3 1 * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pandas beautifulsoup4 gspread google-auth anthropic
      - name: Run auto update
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "$(date -u +%u)" = "4" ]; then
            python auto_update.py collect
          else
            python auto_update.py all
          fi
